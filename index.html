<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FitTrack Pro</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (충돌 방지를 위해 안정화된 18.2.0 버전 고정) -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for in-browser JSX parsing -->
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  
  <!-- Recharts 및 종속성 (안정화 버전 고정) -->
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/classnames@2.3.2/index.js"></script>
  <script crossorigin src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>

  <style>
    /* 모바일 환경 최적화를 위한 커스텀 스타일 */
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .pb-safe { padding-bottom: calc(0.5rem + env(safe-area-inset-bottom)); }
    }
    input[type="number"], input[type="text"], input[type="date"], select {
      outline: none;
    }
    /* 스크롤바 숨기기 (모바일 앱 느낌) */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</head>
<body>
  <!-- 브라우저 에러 캐치 영역 (빈 화면 방지용) -->
  <div id="error-log" style="color: red; padding: 10px; font-size: 12px; font-weight: bold; background: #fee2e2; display: none;"></div>
  
  <!-- 앱 렌더링 영역 -->
  <div id="root"></div>

  <script>
    // 자바스크립트 오류가 발생하면 화면 상단에 표시
    window.onerror = function(message, source, lineno, colno, error) {
      const log = document.getElementById('error-log');
      log.style.display = 'block';
      log.innerText += '에러 발생: ' + message + '\n';
      return false;
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    
    // Recharts 라이브러리가 로딩되지 않았을 때 앱 전체가 멈추는 것을 방어하는 로직
    const Recharts = window.Recharts || {};
    const BarChart = Recharts.BarChart || (({children}) => <div className="p-4 text-center text-slate-400 border rounded-lg">차트를 불러올 수 없습니다. 인터넷 연결을 확인해주세요.</div>);
    const Bar = Recharts.Bar || (() => null);
    const XAxis = Recharts.XAxis || (() => null);
    const YAxis = Recharts.YAxis || (() => null);
    const Tooltip = Recharts.Tooltip || (() => null);
    const ResponsiveContainer = Recharts.ResponsiveContainer || (({children}) => <div className="w-full h-full">{children}</div>);
    const PieChart = Recharts.PieChart || (({children}) => <div className="p-4 text-center text-slate-400 border rounded-lg">차트를 불러올 수 없습니다.</div>);
    const Pie = Recharts.Pie || (() => null);
    const Cell = Recharts.Cell || (() => null);
    const Legend = Recharts.Legend || (() => null);

    // --- Icons (Lucide SVG 대체) ---
    const Icon = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const Calendar = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Icon>;
    const CheckSquare = (p) => <Icon {...p}><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></Icon>;
    const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
    const BarChart3 = (p) => <Icon {...p}><path d="M3 3v18h18"/><rect width="4" height="7" x="7" y="14" rx="1"/><rect width="4" height="12" x="15" y="9" rx="1"/></Icon>;
    const Play = (p) => <Icon {...p}><polygon points="6 3 20 12 6 21 6 3"/></Icon>;
    const Pause = (p) => <Icon {...p}><rect x="14" y="4" width="4" height="16" rx="1"/><rect x="6" y="4" width="4" height="16" rx="1"/></Icon>;
    const RotateCcw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
    const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Trash2 = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;

    // --- Custom Hooks ---
    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.error(error);
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.error(error);
        }
      };

      return [storedValue, setValue];
    }

    // --- Helper Functions ---
    const getLocalYMD = (dateObj) => {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const getTodayStr = () => getLocalYMD(new Date());

    const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];

    // --- Main App Component ---
    function App() {
      const [activeTab, setActiveTab] = useState('daily');
      
      const [logs, setLogs] = useLocalStorage('fitness_logs', {});
      const [plans, setPlans] = useLocalStorage('fitness_plans', {});

      return (
        <div className="flex flex-col h-screen bg-slate-50 text-slate-900 font-sans">
          {/* Header */}
          <header className="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-10">
            <div className="flex items-center gap-2 text-blue-600">
              <BarChart3 className="w-6 h-6" />
              <h1 className="font-bold text-xl tracking-tight">FitTrack Pro</h1>
            </div>
          </header>

          {/* Main Content Area */}
          <main className="flex-1 overflow-y-auto pb-24">
            {activeTab === 'daily' && <DailyChecklist logs={logs} setLogs={setLogs} />}
            {activeTab === 'weekly' && <WeeklyPlanner plans={plans} setPlans={setPlans} />}
            {activeTab === 'monthly' && <MonthlyDashboard logs={logs} />}
          </main>

          {/* Floating Rest Timer */}
          <RestTimer />

          {/* Bottom Navigation */}
          <nav className="fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around pb-safe pt-2 z-20">
            <NavButton active={activeTab === 'daily'} onClick={() => setActiveTab('daily')} icon={CheckSquare} label="Daily" />
            <NavButton active={activeTab === 'weekly'} onClick={() => setActiveTab('weekly')} icon={Clock} label="Weekly" />
            <NavButton active={activeTab === 'monthly'} onClick={() => setActiveTab('monthly')} icon={Calendar} label="Monthly" />
          </nav>
        </div>
      );
    }

    function NavButton({ active, onClick, icon: Icon, label }) {
      return (
        <button 
          onClick={onClick}
          className={`flex-1 py-2 flex flex-col items-center gap-1 transition-colors ${active ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}
        >
          <Icon className={`w-6 h-6 ${active ? 'fill-blue-50' : ''}`} />
          <span className="text-xs font-medium">{label}</span>
        </button>
      );
    }

    // --- 1. Daily Checklist Component ---
    function DailyChecklist({ logs, setLogs }) {
      const [date, setDate] = useState(getTodayStr());
      
      const todayLog = logs[date] || { 
        condition: { sleep: '', soreness: 3, general: 3 }, 
        workouts: [] 
      };

      const updateCondition = (field, value) => {
        let parsedValue = value === '' ? '' : parseFloat(value);
        if (parsedValue !== '') {
          if (field !== 'sleep') {
            if (parsedValue > 5) parsedValue = 5;
            if (parsedValue < 1) parsedValue = 1;
          } else {
            if (parsedValue < 0) parsedValue = 0;
            if (parsedValue > 24) parsedValue = 24;
          }
        }

        setLogs({
          ...logs,
          [date]: {
            ...todayLog,
            condition: { ...todayLog.condition, [field]: parsedValue }
          }
        });
      };

      const addWorkout = (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const newWorkout = {
          id: Date.now().toString(),
          part: formData.get('part'),
          name: formData.get('name'),
          sets: []
        };
        
        setLogs({
          ...logs,
          [date]: { ...todayLog, workouts: [...todayLog.workouts, newWorkout] }
        });
        e.target.reset();
      };

      const deleteWorkout = (workoutId) => {
        if(!window.confirm('이 운동을 삭제하시겠습니까?')) return;

        setLogs(prevLogs => {
          const currentDayLog = prevLogs[date] || { condition: { sleep: '', soreness: 3, general: 3 }, workouts: [] };
          const updatedWorkouts = currentDayLog.workouts.filter(w => w.id !== workoutId);
          return {
            ...prevLogs,
            [date]: {
              ...currentDayLog,
              workouts: updatedWorkouts
            }
          };
        });
      };

      const addSet = (e, workoutId) => {
        e.preventDefault();
        const weight = e.target.weight.value;
        const reps = e.target.reps.value;

        if (weight < 0 || reps <= 0) {
            alert("무게는 0 이상, 횟수는 1 이상이어야 합니다.");
            return;
        }

        const updatedWorkouts = todayLog.workouts.map(w => {
          if (w.id === workoutId) {
            return { ...w, sets: [...w.sets, { weight: Number(weight), reps: Number(reps), completed: false }] };
          }
          return w;
        });
        setLogs({ ...logs, [date]: { ...todayLog, workouts: updatedWorkouts } });
        e.target.reset(); // 입력 필드 초기화
      };

      const toggleSet = (workoutId, setIndex) => {
        const updatedWorkouts = todayLog.workouts.map(w => {
          if (w.id === workoutId) {
            const newSets = [...w.sets];
            newSets[setIndex].completed = !newSets[setIndex].completed;
            return { ...w, sets: newSets };
          }
          return w;
        });
        setLogs({ ...logs, [date]: { ...todayLog, workouts: updatedWorkouts } });
      };

      return (
        <div className="p-4 space-y-6 max-w-2xl mx-auto">
          {/* Date Selector */}
          <div className="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
            <h2 className="font-semibold text-slate-700">날짜 선택</h2>
            <input 
              type="date" 
              value={date} 
              onChange={(e) => setDate(e.target.value)}
              className="border-none bg-slate-50 p-2 rounded-lg text-sm font-medium focus:ring-2 focus:ring-blue-500"
            />
          </div>

          {/* Condition Tracking */}
          <section className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
            <h3 className="font-bold text-lg border-b pb-2 flex items-center gap-2"><Clock className="w-5 h-5 text-blue-500"/> 컨디션 기록</h3>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div>
                <label className="block text-sm text-slate-500 mb-1">수면 시간 (시간)</label>
                <input type="number" min="0" max="24" step="0.5" value={todayLog.condition.sleep} onChange={(e) => updateCondition('sleep', e.target.value)} className="w-full p-2 border rounded-lg" placeholder="예: 7.5" />
              </div>
              <div>
                <label className="block text-sm text-slate-500 mb-1">근육통 (1-5)</label>
                <input type="range" min="1" max="5" value={todayLog.condition.soreness} onChange={(e) => updateCondition('soreness', e.target.value)} className="w-full accent-blue-600" />
                <div className="text-center text-xs text-slate-400 mt-1">{todayLog.condition.soreness}점</div>
              </div>
              <div>
                <label className="block text-sm text-slate-500 mb-1">전반적 컨디션 (1-5)</label>
                <input type="range" min="1" max="5" value={todayLog.condition.general} onChange={(e) => updateCondition('general', e.target.value)} className="w-full accent-green-500" />
                <div className="text-center text-xs text-slate-400 mt-1">{todayLog.condition.general}점</div>
              </div>
            </div>
          </section>

          {/* Workout Routine Management */}
          <section className="space-y-4">
            <h3 className="font-bold text-lg px-1 flex items-center gap-2"><CheckSquare className="w-5 h-5 text-emerald-500"/> 오늘의 운동 루틴</h3>
            
            <form onSubmit={addWorkout} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex gap-2">
              <select name="part" required className="p-2 border rounded-lg text-sm bg-slate-50 w-24">
                <option value="가슴">가슴</option>
                <option value="등">등</option>
                <option value="하체">하체</option>
                <option value="어깨">어깨</option>
                <option value="팔/코어">팔/코어</option>
                <option value="유산소">유산소</option>
              </select>
              <input type="text" name="name" required placeholder="운동명 (예: 벤치프레스)" className="flex-1 p-2 border rounded-lg text-sm" />
              <button type="submit" className="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 transition"><Plus className="w-5 h-5" /></button>
            </form>

            <div className="space-y-4">
              {todayLog.workouts.map(workout => (
                <div key={workout.id} className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                  <div className="bg-slate-50 px-4 py-3 flex justify-between items-center border-b border-slate-100">
                    <div className="flex items-center gap-2">
                      <span className="text-xs font-bold px-2 py-1 bg-blue-100 text-blue-700 rounded-md">{workout.part}</span>
                      <span className="font-bold text-slate-800">{workout.name}</span>
                    </div>
                    <button onClick={() => deleteWorkout(workout.id)} className="text-slate-400 hover:text-red-500"><Trash2 className="w-4 h-4" /></button>
                  </div>
                  
                  <div className="p-4 space-y-3">
                    {workout.sets.map((set, idx) => (
                      <div key={idx} className={`flex items-center justify-between p-2 rounded-lg transition-colors ${set.completed ? 'bg-emerald-50 opacity-70' : 'bg-slate-50'}`}>
                        <div className="flex items-center gap-4">
                          <span className="text-sm font-semibold text-slate-500 w-8">{idx + 1}세트</span>
                          <span className="text-slate-800 font-medium w-16 text-right">{set.weight}kg</span>
                          <span className="text-slate-800 font-medium w-12 text-right">{set.reps}회</span>
                        </div>
                        <button 
                          onClick={() => toggleSet(workout.id, idx)}
                          className={`w-8 h-8 rounded-full flex items-center justify-center transition-colors ${set.completed ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-400'}`}
                        >
                          <Check className="w-4 h-4" />
                        </button>
                      </div>
                    ))}

                    <form 
                      onSubmit={(e) => addSet(e, workout.id)}
                      className="flex gap-2 pt-2 border-t border-slate-100 mt-2"
                    >
                      <input type="number" name="weight" step="0.5" required placeholder="무게(kg)" className="w-20 p-2 border rounded-lg text-sm" />
                      <input type="number" name="reps" required placeholder="횟수" className="w-16 p-2 border rounded-lg text-sm" />
                      <button type="submit" className="flex-1 bg-slate-100 text-slate-600 text-sm font-medium rounded-lg hover:bg-slate-200 transition">세트 추가</button>
                    </form>
                  </div>
                </div>
              ))}
              {todayLog.workouts.length === 0 && (
                <div className="text-center py-10 text-slate-400 text-sm">등록된 운동이 없습니다. 새로운 운동을 추가해보세요!</div>
              )}
            </div>
          </section>
        </div>
      );
    }

    // --- 2. Weekly Planner Component ---
    function WeeklyPlanner({ plans, setPlans }) {
      const [currentWeekStart, setCurrentWeekStart] = useState(() => {
        const d = new Date();
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return getLocalYMD(new Date(d.setDate(diff)));
      });

      const getDaysOfWeek = (startDateStr) => {
        const days = [];
        const [year, month, day] = startDateStr.split('-').map(Number);
        let current = new Date(year, month - 1, day);
        for (let i = 0; i < 7; i++) {
          days.push({
            date: getLocalYMD(current),
            dayName: ['월', '화', '수', '목', '금', '토', '일'][i]
          });
          current.setDate(current.getDate() + 1);
        }
        return days;
      };

      const days = getDaysOfWeek(currentWeekStart);

      const updatePlan = (date, field, value) => {
        setPlans(prev => ({
          ...prev,
          [date]: { ...(prev[date] || { duration: '', part: '' }), [field]: value }
        }));
      };

      const changeWeek = (offset) => {
        const [year, month, day] = currentWeekStart.split('-').map(Number);
        const d = new Date(year, month - 1, day);
        d.setDate(d.getDate() + offset * 7);
        setCurrentWeekStart(getLocalYMD(d));
      };

      return (
        <div className="p-4 max-w-2xl mx-auto space-y-6">
          <div className="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
            <button onClick={() => changeWeek(-1)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg">◀ 이전</button>
            <h2 className="font-semibold text-slate-700">{days[0].date.substring(5)} ~ {days[6].date.substring(5)} 주간 계획</h2>
            <button onClick={() => changeWeek(1)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg">다음 ▶</button>
          </div>

          <div className="space-y-3">
            {days.map(d => {
              const plan = plans[d.date] || { duration: '', part: '' };
              const isToday = d.date === getTodayStr();
              return (
                <div key={d.date} className={`bg-white p-4 rounded-xl shadow-sm border ${isToday ? 'border-blue-400 ring-1 ring-blue-400' : 'border-slate-100'} flex items-center gap-4`}>
                  <div className="w-12 text-center">
                    <div className={`text-sm font-bold ${isToday ? 'text-blue-600' : 'text-slate-500'}`}>{d.dayName}</div>
                    <div className="text-xs text-slate-400">{d.date.substring(8, 10)}</div>
                  </div>
                  <div className="flex-1 grid grid-cols-2 gap-2">
                    <input 
                      type="text" 
                      placeholder="예상 시간(분)" 
                      value={plan.duration} 
                      onChange={(e) => updatePlan(d.date, 'duration', e.target.value)}
                      className="w-full p-2 border rounded-lg text-sm bg-slate-50 focus:bg-white"
                    />
                    <input 
                      type="text" 
                      placeholder="목표 부위" 
                      value={plan.part} 
                      onChange={(e) => updatePlan(d.date, 'part', e.target.value)}
                      className="w-full p-2 border rounded-lg text-sm bg-slate-50 focus:bg-white"
                    />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // --- 3. Monthly Dashboard Component ---
    function MonthlyDashboard({ logs }) {
      const chartData = useMemo(() => {
        const volumeByDate = [];
        const partCount = {};
        let totalVolumeStr = 0;

        Object.keys(logs).sort().forEach(date => {
          let dailyVolume = 0;
          const log = logs[date];
          
          if (log.workouts) {
            log.workouts.forEach(w => {
              const completedSets = w.sets.filter(s => s.completed);
              if (completedSets.length > 0) {
                partCount[w.part] = (partCount[w.part] || 0) + 1;
                
                completedSets.forEach(s => {
                  const vol = s.weight * s.reps;
                  dailyVolume += vol;
                  totalVolumeStr += vol;
                });
              }
            });
          }
          
          if (dailyVolume > 0) {
             volumeByDate.push({
               date: date.substring(5),
               볼륨: dailyVolume
             });
          }
        });

        const pieData = Object.keys(partCount).map(key => ({
          name: key, value: partCount[key]
        }));

        const recentVolume = volumeByDate.slice(-14);

        return { recentVolume, pieData, totalVolumeStr };
      }, [logs]);

      return (
        <div className="p-4 max-w-2xl mx-auto space-y-6">
          <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-6 text-white shadow-md">
            <h2 className="text-blue-100 text-sm font-medium mb-1">나의 누적 운동 볼륨</h2>
            <div className="text-3xl font-bold">{chartData.totalVolumeStr.toLocaleString()} <span className="text-lg font-normal opacity-80">kg</span></div>
          </div>

          <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <h3 className="font-bold text-slate-800 mb-4 text-sm flex items-center gap-2">
              <BarChart3 className="w-4 h-4" /> 일별 운동 볼륨 추이 (최근 완료 기준)
            </h3>
            <div className="h-64 w-full">
              {chartData.recentVolume.length > 0 ? (
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={chartData.recentVolume}>
                    <XAxis dataKey="date" fontSize={10} stroke="#94a3b8" />
                    <YAxis fontSize={10} stroke="#94a3b8" width={40} />
                    <Tooltip cursor={{fill: '#f1f5f9'}} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                    <Bar dataKey="볼륨" fill="#3b82f6" radius={[4, 4, 0, 0]} />
                  </BarChart>
                </ResponsiveContainer>
              ) : (
                <div className="h-full flex items-center justify-center text-slate-400 text-sm">운동 기록을 추가하면 차트가 생성됩니다.</div>
              )}
            </div>
          </div>

          <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <h3 className="font-bold text-slate-800 mb-4 text-sm flex items-center gap-2">
              <PieChart className="w-4 h-4" /> 타겟 부위별 비율
            </h3>
            <div className="h-64 w-full">
              {chartData.pieData.length > 0 ? (
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie
                      data={chartData.pieData}
                      cx="50%"
                      cy="50%"
                      innerRadius={60}
                      outerRadius={80}
                      paddingAngle={5}
                      dataKey="value"
                    >
                      {chartData.pieData.map((entry, index) => (
                        <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                      ))}
                    </Pie>
                    <Tooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                    <Legend iconType="circle" wrapperStyle={{fontSize: '12px'}} />
                  </PieChart>
                </ResponsiveContainer>
              ) : (
                <div className="h-full flex items-center justify-center text-slate-400 text-sm">운동 기록이 없습니다.</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // --- 4. Floating Rest Timer Component ---
    function RestTimer() {
      const [time, setTime] = useState(0);
      const [isActive, setIsActive] = useState(false);
      const [isExpanded, setIsExpanded] = useState(false);

      useEffect(() => {
        let interval = null;
        if (isActive && time > 0) {
          interval = setInterval(() => {
            setTime((time) => time - 1);
          }, 1000);
        } else if (time === 0 && isActive) {
          setIsActive(false);
          if (window.navigator.vibrate) {
            window.navigator.vibrate(500); 
          }
        }
        return () => clearInterval(interval);
      }, [isActive, time]);

      const toggleTimer = () => setIsActive(!isActive);
      
      const resetTimer = (seconds) => {
        setTime(seconds);
        setIsActive(true);
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs.toString().padStart(2, '0')}`;
      };

      if (!isExpanded && time === 0 && !isActive) {
        return (
          <button 
            onClick={() => setIsExpanded(true)}
            className="fixed bottom-24 right-4 bg-slate-800 text-white p-3 rounded-full shadow-lg z-30 transition-transform hover:scale-105"
          >
            <Clock className="w-6 h-6" />
          </button>
        );
      }

      return (
        <div className={`fixed bottom-24 right-4 bg-slate-800 text-white rounded-2xl shadow-xl z-30 overflow-hidden transition-all duration-300 ${isExpanded ? 'w-64' : 'w-auto'}`}>
          <div className="flex items-center justify-between p-3 bg-slate-900 border-b border-slate-700 cursor-pointer" onClick={() => setIsExpanded(!isExpanded)}>
            <div className="flex items-center gap-2 px-2">
              <Clock className="w-4 h-4 text-blue-400" />
              <span className="font-mono text-xl font-bold tracking-wider">{formatTime(time)}</span>
            </div>
            <div className="flex gap-1">
              <button onClick={(e) => { e.stopPropagation(); toggleTimer(); }} className="p-1.5 bg-slate-700 rounded-md hover:bg-slate-600">
                {isActive ? <Pause className="w-4 h-4" /> : <Play className="w-4 h-4" />}
              </button>
              <button onClick={(e) => { e.stopPropagation(); setTime(0); setIsActive(false); }} className="p-1.5 bg-slate-700 rounded-md hover:bg-slate-600">
                <RotateCcw className="w-4 h-4" />
              </button>
            </div>
          </div>
          
          {isExpanded && (
            <div className="p-3 grid grid-cols-3 gap-2 bg-slate-800">
              <button onClick={() => resetTimer(30)} className="py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium">30초</button>
              <button onClick={() => resetTimer(60)} className="py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium">1분</button>
              <button onClick={() => resetTimer(90)} className="py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium">1.5분</button>
            </div>
          )}
        </div>
      );
    }

    // --- Render App ---
    // 안정성을 위해 React 18 방식과 Fallback 방식을 결합
    const rootElement = document.getElementById('root');
    if (ReactDOM.createRoot) {
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    } else {
      ReactDOM.render(<App />, rootElement);
    }
  </script>
</body>
</html>
